services:
  - type: web
    name: recipe-match-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: CORS_ORIGINS
        value: "https://your-frontend-url.vercel.app" # REPLACE THIS AFTER FRONTEND DEPLOYMENT
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: GEMINI_TIMEOUT_MS
        value: 30000
      - key: SPOONACULAR_API_KEY
        sync: false
      - key: SPOONACULAR_TIMEOUT_MS
        value: 8000
